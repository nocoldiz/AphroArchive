<a class="video-card fade-in bookmark-card" href="{{url}}" target="_blank" rel="noopener" data-bm-url="{{url}}">
  <div class="{{ctClass}}"{{needsObs}} style="{{thumbStyle}}">
    {{urlBadge}}
    <div class="play-overlay" style="opacity:.55"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></div>
  </div>
  <div class="card-body">
    <div class="card-title" title="{{url}}">{{title}}</div>
    <div class="card-meta">
      <span class="card-category">{{hostname}}</span>
      <div class="card-actions">
        <button onclick="event.preventDefault();event.stopPropagation();bmRemove('{{url}}')" title="Remove bookmark"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
      </div>
    </div>
  </div>
</a>
