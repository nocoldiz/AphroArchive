<a class="video-card fade-in {{selClass}}" data-id="{{id}}" href="/video/{{id}}" onclick="event.preventDefault();openVid('{{id}}')"{{dragAttr}}>
  <div class="{{thumbClass}}" data-vid="{{id}}" style="{{thumbStyle}}">
    <div class="video-chk"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
    <span class="ext-badge">{{ext}}</span>
    <div class="play-overlay"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg></div>
    {{duration}}
    <span class="size-badge">{{sizeF}}</span>
    {{rating}}
    <div class="card-thumb-actions">{{thumbDelBtn}}{{thumbDescBtn}}</div>
  </div>
  <div class="card-body">
    <div class="card-title" title="{{nameA}}">{{name}}</div>
    <div class="card-meta">
      <span class="card-category">{{category}}</span>
      <div class="card-actions">{{starBtn}}{{renBtn}}{{moveBtn}}{{tagBtn}}{{actorBtn}}{{studioBtn}}{{plBtn}}</div>
    </div>
  </div>
</a>
