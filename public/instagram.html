<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AphroArchive — Instagram Mode</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 14px; }
    body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow-x: hidden; }

    .ig-app { display: flex; min-height: 100vh; }

    /* ── Left nav ── */
    .ig-nav {
      width: 245px; position: fixed; top: 0; left: 0; height: 100vh;
      padding: 8px 12px 20px; border-right: 1px solid #262626;
      background: #000; z-index: 100; display: flex; flex-direction: column; gap: 4px;
    }
    .ig-nav-logo {
      padding: 20px 12px 24px; font-size: 20px; font-weight: 700; font-style: italic;
      letter-spacing: -.5px; display: flex; align-items: center; gap: 10px;
    }
    .ig-nav-item {
      display: flex; align-items: center; gap: 16px; padding: 12px;
      border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 400;
      transition: background .15s; user-select: none; white-space: nowrap;
    }
    .ig-nav-item:hover { background: #1a1a1a; }
    .ig-nav-item.active { font-weight: 600; }
    .ig-nav-item.vault-on { color: #e84040; }
    .ig-nav-spacer { flex: 1; }

    /* ── Main content ── */
    .ig-content { margin-left: 245px; flex: 1; display: flex; align-items: flex-start; justify-content: center; padding: 0; min-width: 0; }

    /* ── Feed ── */
    .ig-feed { flex: none; width: 680px; max-width: 100%; padding: 24px 12px; display: flex; flex-direction: column; }
    .ig-feed.hidden { display: none; }

    /* Stories */
    .ig-stories {
      display: flex; gap: 14px; overflow-x: auto; padding: 8px 0 20px;
      scrollbar-width: none; border-bottom: 1px solid #262626; margin-bottom: 16px; flex-shrink: 0;
    }
    .ig-stories::-webkit-scrollbar { display: none; }
    .ig-story { display: flex; flex-direction: column; align-items: center; gap: 6px; flex-shrink: 0; cursor: pointer; }
    .ig-story-ring {
      width: 58px; height: 58px; border-radius: 50%; padding: 2px;
      background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
    }
    .ig-story-inner {
      width: 100%; height: 100%; border-radius: 50%; border: 2px solid #000;
      overflow: hidden; display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 18px;
    }
    .ig-story-name { font-size: 12px; color: #a8a8a8; max-width: 64px; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── Feed toolbar ── */
    .ig-toolbar {
      display: flex; align-items: center; gap: 8px; padding: 12px 0 14px;
      border-bottom: 1px solid #262626; margin-bottom: 16px; flex-shrink: 0; flex-wrap: wrap;
    }
    .ig-tb-btn {
      display: flex; align-items: center; gap: 6px; background: #1a1a1a; border: 1px solid #333;
      color: #fff; padding: 6px 12px; border-radius: 20px; font-size: 13px; cursor: pointer;
      transition: background .15s, border-color .15s; white-space: nowrap;
    }
    .ig-tb-btn:hover { background: #262626; border-color: #555; }
    .ig-tb-btn.active { border-color: #e84040; color: #e84040; }
    .ig-sort-dropdown { position: relative; }
    .ig-sort-menu {
      display: none; position: absolute; top: calc(100% + 6px); left: 0;
      background: #1a1a1a; border: 1px solid #333; border-radius: 8px;
      overflow: hidden; z-index: 200; min-width: 150px;
    }
    .ig-sort-menu.open { display: block; }
    .ig-sort-opt {
      padding: 10px 16px; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 8px;
      transition: background .1s;
    }
    .ig-sort-opt:hover { background: #262626; }
    .ig-sort-opt.selected { color: #e84040; font-weight: 600; }

    /* Post */
    .ig-post { border: 1px solid #262626; border-radius: 3px; background: #000; margin-bottom: 16px; }
    .ig-post-header { display: flex; align-items: center; padding: 12px 16px; gap: 12px; }
    .ig-post-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 13px; flex-shrink: 0; color: #fff;
    }
    .ig-post-info { flex: 1; min-width: 0; }
    .ig-post-username { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ig-post-meta { font-size: 12px; color: #a8a8a8; }
    .ig-post-menu { background: none; border: none; color: #a8a8a8; cursor: pointer; padding: 4px; font-size: 18px; line-height: 1; }

    /* Media */
    .ig-post-media { position: relative; background: #111; cursor: pointer; overflow: hidden; aspect-ratio: 1; }
    .ig-post-media img {
      position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: block;
      transition: opacity .3s;
    }
    .ig-post-media video {
      position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: block;
      opacity: 0; transition: opacity .4s;
    }
    .ig-post-media video.playing { opacity: 1; }
    .ig-post-media img.faded { opacity: 0; }
    .ig-placeholder {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 10px; color: #555; background: #1a1a1a;
    }
    .ig-play-overlay {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,.25); opacity: 0; transition: opacity .2s; z-index: 2;
    }
    .ig-post-media:hover .ig-play-overlay { opacity: 1; }
    .ig-play-btn {
      width: 50px; height: 50px; border-radius: 50%; background: rgba(0,0,0,.6);
      display: flex; align-items: center; justify-content: center;
    }
    .ig-vault-tag {
      position: absolute; top: 10px; right: 10px; background: #e84040;
      color: #fff; font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 12px; z-index: 3;
    }
    .ig-duration-badge {
      position: absolute; bottom: 8px; right: 10px; background: rgba(0,0,0,.7);
      color: #fff; font-size: 12px; padding: 2px 6px; border-radius: 4px; z-index: 3;
    }
    /* Muted indicator when video autoplays */
    .ig-muted-badge {
      position: absolute; bottom: 8px; left: 10px; background: rgba(0,0,0,.7);
      color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 4px; z-index: 3;
      display: none; align-items: center; gap: 4px; cursor: pointer;
    }
    .ig-post-media.autoplaying .ig-muted-badge { display: flex; }

    /* Actions */
    .ig-post-actions { display: flex; align-items: center; padding: 6px 12px 0; gap: 6px; }
    .ig-act-btn {
      background: none; border: none; color: #fff; cursor: pointer;
      padding: 6px; transition: transform .1s; display: flex;
    }
    .ig-act-btn:hover { transform: scale(1.1); }
    .ig-act-btn.liked svg { fill: #ed4956; stroke: #ed4956; }
    .ig-act-btn.saved svg { fill: #fff; }
    .ig-spacer { flex: 1; }
    .ig-post-likes { padding: 6px 16px 2px; font-size: 14px; font-weight: 600; }
    .ig-post-caption { padding: 2px 16px 4px; font-size: 14px; line-height: 1.5; }
    .ig-post-caption strong { font-weight: 600; margin-right: 6px; }
    .ig-post-tags { padding: 0 16px 4px; font-size: 13px; color: #a8a8a8; }
    .ig-post-time { padding: 0 16px 12px; font-size: 11px; color: #a8a8a8; text-transform: uppercase; letter-spacing: .3px; }

    /* ── Explore grid ── */
    .ig-explore { flex: 1; min-width: 0; padding: 24px 24px 24px 32px; display: none; }
    .ig-explore.show { display: block; }
    .ig-explore-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; }
    .ig-explore-item { position: relative; aspect-ratio: 1; overflow: hidden; cursor: pointer; background: #1a1a1a; }
    .ig-explore-item img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .2s; }
    .ig-explore-item:hover img { transform: scale(1.04); }
    .ig-explore-overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,.45);
      display: flex; align-items: center; justify-content: center; gap: 20px;
      opacity: 0; transition: opacity .2s;
    }
    .ig-explore-item:hover .ig-explore-overlay { opacity: 1; }
    .ig-explore-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: #444; }
    .ig-explore-vault { position: absolute; top: 6px; right: 6px; background: #e84040; width: 8px; height: 8px; border-radius: 50%; }

    /* ── Right sidebar ── */
    .ig-right { width: 300px; flex-shrink: 0; padding: 24px 20px 24px 0; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
    .ig-account { display: flex; align-items: center; gap: 14px; padding-bottom: 20px; }
    .ig-account-avatar { width: 56px; height: 56px; border-radius: 50%; background: #e84040; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 22px; flex-shrink: 0; }
    .ig-account-name { font-weight: 600; font-size: 14px; }
    .ig-account-sub { font-size: 12px; color: #a8a8a8; }
    .ig-sug-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .ig-sug-header span { font-size: 14px; font-weight: 600; color: #a8a8a8; }
    .ig-sug-item { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .ig-sug-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; flex-shrink: 0; color: #fff; }
    .ig-sug-info { flex: 1; min-width: 0; }
    .ig-sug-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ig-sug-sub { font-size: 12px; color: #a8a8a8; }
    .ig-sug-btn { background: none; border: none; color: #0095f6; font-size: 12px; font-weight: 600; cursor: pointer; }
    .ig-right-controls { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #262626; }

    /* ── Modal ── */
    .ig-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85); z-index: 1000; align-items: center; justify-content: center; }
    .ig-modal.open { display: flex; }
    .ig-modal-close { position: fixed; top: 16px; right: 20px; background: none; border: none; color: #fff; cursor: pointer; font-size: 28px; z-index: 1001; line-height: 1; }
    .ig-modal-inner { display: flex; max-width: 90vw; max-height: 90vh; background: #000; border-radius: 4px; overflow: hidden; border: 1px solid #262626; }
    .ig-modal-media { flex: 1; background: #111; display: flex; align-items: center; justify-content: center; min-width: 0; }
    .ig-modal-media video { max-width: min(860px,65vw); max-height: 90vh; display: block; }
    .ig-modal-media img { max-width: min(860px,65vw); max-height: 90vh; display: block; object-fit: contain; }
    .ig-modal-side { width: 335px; display: flex; flex-direction: column; border-left: 1px solid #262626; flex-shrink: 0; }
    .ig-modal-header { padding: 14px 16px; border-bottom: 1px solid #262626; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .ig-modal-info { flex: 1; min-width: 0; }
    .ig-modal-username { font-size: 14px; font-weight: 600; }
    .ig-modal-meta { font-size: 12px; color: #a8a8a8; }
    .ig-modal-body { flex: 1; overflow-y: auto; padding: 16px; }
    .ig-modal-title { font-size: 14px; line-height: 1.5; margin-bottom: 8px; }
    .ig-modal-detail { font-size: 12px; color: #a8a8a8; margin-bottom: 4px; }
    .ig-modal-actions { padding: 8px 12px; border-top: 1px solid #262626; display: flex; gap: 4px; flex-shrink: 0; }

    /* ── Loaders / states ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .ig-spinner { width: 24px; height: 24px; border: 2px solid #333; border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; margin: 30px auto; }
    .ig-loading { text-align: center; padding: 20px; }
    .ig-end-msg { text-align: center; padding: 24px; font-size: 13px; color: #555; }

    /* ── Vault unlock prompt ── */
    .ig-vault-prompt { padding: 40px 20px; text-align: center; border: 1px solid #262626; border-radius: 8px; margin: 20px 0; }
    .ig-vault-prompt h3 { margin-bottom: 12px; font-size: 18px; }
    .ig-vault-prompt p { color: #a8a8a8; font-size: 14px; margin-bottom: 20px; }
    .ig-vault-input { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 10px 14px; border-radius: 6px; font-size: 14px; width: 240px; }
    .ig-vault-input:focus { outline: none; border-color: #555; }
    .ig-unlock-btn { background: #0095f6; color: #fff; border: none; padding: 10px 24px; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; display: block; margin: 12px auto 0; }
    .ig-unlock-btn:hover { background: #1aa3ff; }
    .ig-vault-err { color: #ed4956; font-size: 13px; margin-top: 8px; min-height: 18px; }

    /* ── AI Comments modal ── */
    .ig-comments-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 1100; align-items: flex-end; justify-content: center; }
    .ig-comments-modal.open { display: flex; }
    .ig-comments-sheet {
      background: #1a1a1a; border-radius: 16px 16px 0 0; width: 100%; max-width: 600px;
      max-height: 80vh; display: flex; flex-direction: column;
      animation: slideUp .25s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .ig-comments-sheet-hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px 10px; border-bottom: 1px solid #262626; flex-shrink: 0;
    }
    .ig-comments-sheet-title { font-size: 15px; font-weight: 700; }
    .ig-comments-sheet-close { background: none; border: none; color: #a8a8a8; cursor: pointer; font-size: 22px; line-height: 1; padding: 2px 6px; }
    .ig-comments-sheet-body { flex: 1; overflow-y: auto; padding: 12px 16px 24px; }
    .ig-comment-row { display: flex; gap: 10px; margin-bottom: 14px; align-items: flex-start; }
    .ig-comment-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; color: #fff; flex-shrink: 0; }
    .ig-comment-username { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
    .ig-comment-text { font-size: 14px; color: #e0e0e0; line-height: 1.5; }
    .ig-comments-loading { display: flex; align-items: center; gap: 10px; padding: 16px 0; font-size: 14px; color: #a8a8a8; }
    .ig-comments-spinner { width: 16px; height: 16px; border: 2px solid #333; border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
    .ig-act-btn.comments-on svg { stroke: #0095f6; }

    /* ── Story viewer ── */
    .ig-story-viewer {
      display: none; position: fixed; inset: 0; background: #000; z-index: 2000;
      flex-direction: column; align-items: center; justify-content: center;
    }
    .ig-story-viewer.open { display: flex; }
    .ig-sv-progress {
      position: absolute; top: 0; left: 0; right: 0; display: flex; gap: 4px; padding: 10px 12px 0; z-index: 10;
    }
    .ig-sv-bar { flex: 1; height: 2px; background: rgba(255,255,255,.35); border-radius: 2px; overflow: hidden; }
    .ig-sv-bar-fill { height: 100%; background: #fff; width: 0; }
    .ig-sv-bar-fill.done { width: 100%; }
    .ig-sv-bar-fill.active { animation: svprogress var(--sv-dur,8s) linear forwards; }
    @keyframes svprogress { from { width: 0 } to { width: 100% } }
    .ig-sv-header {
      position: absolute; top: 22px; left: 0; right: 0; display: flex; align-items: center;
      justify-content: space-between; padding: 8px 14px; z-index: 10;
    }
    .ig-sv-user { display: flex; align-items: center; gap: 10px; }
    .ig-sv-avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; color: #fff; flex-shrink: 0; }
    .ig-sv-name { font-size: 14px; font-weight: 600; text-shadow: 0 1px 3px rgba(0,0,0,.6); }
    .ig-sv-close { background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; line-height: 1; text-shadow: 0 1px 3px rgba(0,0,0,.6); }
    .ig-sv-media {
      width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden;
    }
    .ig-sv-media video {
      width: 100%; height: 100%; object-fit: contain; display: block; max-width: 500px;
    }
    .ig-sv-media img {
      max-width: 500px; max-height: 100%; object-fit: contain; display: block;
    }
    .ig-sv-zone {
      position: absolute; top: 0; bottom: 0; width: 35%; cursor: pointer; z-index: 5;
    }
    #ig-sv-prev { left: 0; }
    #ig-sv-next { right: 0; }
    .ig-sv-counter {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      font-size: 13px; color: rgba(255,255,255,.7); z-index: 10; text-shadow: 0 1px 3px rgba(0,0,0,.6);
    }

    /* ── Profile view ── */
    .ig-profile { display: none; flex: 1; min-width: 0; padding: 24px 24px 24px 32px; max-width: 540px; }
    .ig-profile.show { display: flex; flex-direction: column; }
    .ig-profile-header { display: flex; align-items: center; gap: 28px; padding-bottom: 24px; border-bottom: 1px solid #262626; margin-bottom: 20px; }
    .ig-profile-avatar { width: 86px; height: 86px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 32px; color: #fff; flex-shrink: 0; }
    .ig-profile-meta { flex: 1; }
    .ig-profile-name { font-size: 20px; font-weight: 300; margin-bottom: 12px; letter-spacing: -.3px; }
    .ig-profile-stats { display: flex; gap: 28px; margin-bottom: 10px; }
    .ig-profile-stat { text-align: center; font-size: 14px; }
    .ig-profile-stat strong { display: block; font-size: 16px; font-weight: 700; }
    .ig-profile-bio { font-size: 13px; color: #a8a8a8; }
    .ig-profile-back { display: flex; align-items: center; gap: 8px; background: none; border: none; color: #a8a8a8; cursor: pointer; font-size: 14px; margin-bottom: 16px; padding: 0; transition: color .15s; }
    .ig-profile-back:hover { color: #fff; }
    .ig-profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; }
    .ig-profile-tile { aspect-ratio: 1; position: relative; background: #1a1a1a; overflow: hidden; cursor: pointer; }
    .ig-profile-tile img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .2s; }
    .ig-profile-tile:hover img { transform: scale(1.05); }
    .ig-profile-tile-overlay { position: absolute; inset: 0; background: rgba(0,0,0,.45); display: flex; align-items: center; justify-content: center; gap: 16px; opacity: 0; transition: opacity .2s; }
    .ig-profile-tile:hover .ig-profile-tile-overlay { opacity: 1; }
    .ig-profile-tile-stat { display: flex; align-items: center; gap: 5px; color: #fff; font-size: 14px; font-weight: 700; }
    .ig-profile-tabs { display: flex; border-top: 1px solid #262626; margin-bottom: 16px; }
    .ig-profile-tab { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 12px; border-top: 1px solid transparent; font-size: 12px; font-weight: 600; color: #a8a8a8; cursor: pointer; letter-spacing: .8px; text-transform: uppercase; margin-top: -1px; transition: color .15s, border-color .15s; }
    .ig-profile-tab.active { border-top-color: #fff; color: #fff; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }

    @media (max-width: 1264px) { .ig-right { display: none; } }
    @media (max-width: 768px) {
      .ig-nav {
        width: 100%; height: auto;
        top: auto; bottom: 0; left: 0;
        flex-direction: row; align-items: center; justify-content: space-around;
        padding: 8px 4px; border-right: none; border-top: 1px solid #262626;
        gap: 0;
      }
      .ig-nav-logo { display: none; }
      .ig-nav-item { flex-direction: column; gap: 3px; padding: 6px 10px; font-size: 10px; }
      .ig-nav-item span { display: block; font-size: 10px; }
      .ig-nav-spacer { display: none; }
      .ig-content { margin-left: 0; margin-bottom: 60px; }
      .ig-feed { padding: 16px 12px; }
    }
  </style>
</head>
<body>
<div class="ig-app">

  <!-- ── Left Nav ── -->
  <nav class="ig-nav">
    <div class="ig-nav-logo">
      <svg viewBox="0 0 28 28" fill="none" width="28" height="28">
        <rect width="28" height="28" rx="6" fill="#e84040"/>
        <polygon points="11,7 11,21 22,14" fill="#fff"/>
      </svg>
      <span class="ig-nav-logo-text">AphroArchive</span>
    </div>
    <div class="ig-nav-item active" id="nav-feed" onclick="showView('feed')">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Feed</span>
    </div>
    <div class="ig-nav-item" id="nav-explore" onclick="showView('explore')">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span>Explore</span>
    </div>
    <div class="ig-nav-item" id="nav-vault" onclick="toggleVaultOnly()">

          Shuffle

<script>
// ── State ──────────────────────────────────────────────────────────────────
let allVideos = [];
let vaultFiles = [];
let vaultFolderMap = {}; // folderId → folderName
let vaultUnlocked = false;
let vaultOnly = false;
let feedPage = 0;
const PAGE_SIZE = 10;
let feedLoading = false;
let feedDone = false;
let igAiCommentsEnabled = false;
let curView = 'feed';
let likedIds = new Set();
let savedIds = new Set();
let curModal = null;
let curSort = 'date';
let isShuffled = false;
let shuffledOrder = [];
let autoplayEnabled = true;
let feedObserver = null;
let activeVideoEl = null; // currently autoplaying video element

const COLORS = ['#e84040','#3b82f6','#10b981','#f59e0b','#8b5cf6','#ec4899','#06b6d4','#f97316','#14b8a6','#a855f7'];

function strColor(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
  return COLORS[Math.abs(h) % COLORS.length];
}
function initial(s) { return (s || '?').charAt(0).toUpperCase(); }
function timeAgo(mtime) {
  const d = Date.now() - mtime, m = Math.floor(d / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return m + 'm';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h';
  const days = Math.floor(h / 24);
  if (days < 7) return days + 'd';
  if (days < 30) return Math.floor(days / 7) + 'w';
  return Math.floor(days / 30) + 'mo';
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function formatBytes(b) {
  if (!b) return '';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  if (b < 1073741824) return (b/1048576).toFixed(1) + ' MB';
  return (b/1073741824).toFixed(2) + ' GB';
}

// ── Init ───────────────────────────────────────────────────────────────────
async function init() {
  await Promise.all([loadVideos(), checkVaultStatus(), loadPrefs(), loadVaultFavs()]);
  renderStories();
  renderSuggestions();
  setupFeedObserver();
  loadFeedPage();
}

async function loadPrefs() {
  try {
    const p = await (await fetch('/api/settings/prefs')).json();
    igAiCommentsEnabled = !!p.aiCommentsEnabled;
  } catch {}
}

async function loadVideos() {
  try {
    const r = await fetch('/api/videos?sort=date');
    allVideos = await r.json();
    allVideos.forEach(v => { if (v.fav) likedIds.add(v.id); });
  } catch { allVideos = []; }
}

async function loadVaultFavs() {
  try {
    const ids = await fetch('/api/vault/favs').then(r => r.json());
    if (Array.isArray(ids)) ids.forEach(id => likedIds.add(id));
  } catch {}
}

async function checkVaultStatus() {
  try {
    const s = await (await fetch('/api/vault/status')).json();
    vaultUnlocked = s.unlocked;
    if (s.unlocked) await loadVaultFiles();
  } catch {}
}

async function loadVaultFiles() {
  try {
    const items = await (await fetch('/api/vault/files')).json();
    if (!items.error) {
      items.filter(f => f.type === 'folder').forEach(f => { vaultFolderMap[f.id] = f.name; });
      vaultFiles = items.filter(f => f.type !== 'folder');
    }
  } catch {}
}

function vaultUser(item) {
  if (item.folder && vaultFolderMap[item.folder]) return vaultFolderMap[item.folder];
  return 'Vault';
}

// ── Sort ───────────────────────────────────────────────────────────────────
function toggleSortMenu() {
  document.getElementById('ig-sort-menu').classList.toggle('open');
}

function setSort(key, label) {
  curSort = key;
  isShuffled = false;
  document.getElementById('ig-sort-label').textContent = 'Sort: ' + label;
  document.querySelectorAll('.ig-sort-opt').forEach(o => o.classList.toggle('selected', o.dataset.sort === key));
  document.getElementById('ig-sort-menu').classList.remove('open');
  resetFeed();
}

function shuffleFeed() {
  isShuffled = true;
  const items = getRawItems();
  shuffledOrder = [...items].sort(() => Math.random() - .5);
  document.getElementById('ig-sort-label').textContent = 'Sort: Shuffled';
  document.querySelectorAll('.ig-sort-opt').forEach(o => o.classList.remove('selected'));
  resetFeed();
}

document.addEventListener('click', e => {
  const wrap = document.getElementById('ig-sort-wrap');
  if (wrap && !wrap.contains(e.target)) document.getElementById('ig-sort-menu').classList.remove('open');
});

// ── Autoplay ───────────────────────────────────────────────────────────────
function setupFeedObserver() {
  if (feedObserver) feedObserver.disconnect();
  feedObserver = new IntersectionObserver(entries => {
    if (!autoplayEnabled) return;
    entries.forEach(entry => {
      const post = entry.target;
      const mediaEl = post.querySelector('.ig-post-media');
      if (!mediaEl) return;
      if (entry.isIntersecting && entry.intersectionRatio >= 0.6) {
        startAutoplay(post, mediaEl);
      } else {
        stopAutoplay(post, mediaEl);
      }
    });
  }, { threshold: [0, 0.6] });
}

function observePost(postEl) {
  if (feedObserver) feedObserver.observe(postEl);
}

function startAutoplay(post, mediaEl) {
  const streamUrl = post.dataset.stream;
  if (!streamUrl) return;
  let vid = mediaEl.querySelector('video');
  if (!vid) {
    vid = document.createElement('video');
    vid.muted = true;
    vid.loop = true;
    vid.playsInline = true;
    vid.preload = 'metadata';
    vid.src = streamUrl;
    mediaEl.appendChild(vid);
  }
  vid.play().then(() => {
    vid.classList.add('playing');
    const img = mediaEl.querySelector('img');
    if (img) img.classList.add('faded');
    mediaEl.classList.add('autoplaying');
  }).catch(() => {});
}

function stopAutoplay(post, mediaEl) {
  const vid = mediaEl.querySelector('video');
  if (!vid) return;
  vid.pause();
  vid.classList.remove('playing');
  const img = mediaEl.querySelector('img');
  if (img) img.classList.remove('faded');
  mediaEl.classList.remove('autoplaying');
}

function toggleAutoplay() {
  autoplayEnabled = !autoplayEnabled;
  const btn = document.getElementById('ig-autoplay-btn');
  const label = document.getElementById('ig-autoplay-label');
  btn.classList.toggle('active', !autoplayEnabled);
  label.textContent = autoplayEnabled ? 'Autoplay On' : 'Autoplay Off';
  if (!autoplayEnabled) {
    // Stop all playing videos in feed
    document.querySelectorAll('.ig-post-media video').forEach(vid => {
      vid.pause();
      vid.classList.remove('playing');
    });
    document.querySelectorAll('.ig-post-media img').forEach(img => img.classList.remove('faded'));
    document.querySelectorAll('.ig-post-media').forEach(m => m.classList.remove('autoplaying'));
  }
}

// ── View switching ─────────────────────────────────────────────────────────
function showView(view) {
  curView = view;
  document.getElementById('nav-feed').classList.toggle('active', view === 'feed');
  document.getElementById('nav-explore').classList.toggle('active', view === 'explore');
  document.getElementById('ig-feed').classList.toggle('hidden', view !== 'feed');
  document.getElementById('ig-right').style.display = view === 'feed' ? '' : 'none';
  document.getElementById('ig-profile').classList.remove('show');
  const exploreEl = document.getElementById('ig-explore');
  if (view === 'explore') {
    exploreEl.classList.add('show');
    if (!exploreEl.dataset.loaded) { exploreEl.dataset.loaded = '1'; renderExplore(); }
  } else {
    exploreEl.classList.remove('show');
  }
}

// ── Profile ────────────────────────────────────────────────────────────────
function openProfile(key) {
  // key = 'cat:CategoryName' or 'vault:folderId'
  const isVaultProfile = key.startsWith('vault:');
  const id = key.slice(key.indexOf(':') + 1);

  let items, displayName;
  if (isVaultProfile) {
    displayName = id === '__root__' ? 'Vault' : (vaultFolderMap[id] || 'Vault');
    items = vaultFiles.filter(f => (f.folder || '__root__') === id).map(f => ({...f, _vault: true}));
  } else {
    displayName = id;
    items = allVideos.filter(v => (v.category || 'Uncategorized') === id).map(v => ({...v, _vault: false}));
  }

  const color = strColor(displayName);
  const postCount = items.length;
  const likedCount = items.filter(i => likedIds.has(i.id)).length;

  document.getElementById('ig-feed').classList.add('hidden');
  document.getElementById('ig-right').style.display = 'none';
  document.getElementById('ig-explore').classList.remove('show');
  document.getElementById('ig-profile').classList.add('show');

  document.getElementById('ig-profile-header').innerHTML = `
    <div class="ig-profile-avatar" style="background:${color}">${initial(displayName)}</div>
    <div class="ig-profile-meta">
      <div class="ig-profile-name">${esc(displayName)}</div>
      <div class="ig-profile-stats">
        <div class="ig-profile-stat"><strong>${postCount}</strong>posts</div>
        <div class="ig-profile-stat"><strong>${likedCount}</strong>liked</div>
        ${isVaultProfile ? '<div class="ig-profile-stat"><strong>🔒</strong>vault</div>' : ''}
      </div>
      <div class="ig-profile-bio">${isVaultProfile ? 'Vault folder' : 'Category · ' + postCount + ' video' + (postCount !== 1 ? 's' : '')}</div>
    </div>`;

  const grid = document.getElementById('ig-profile-grid');
  grid.innerHTML = items.map(item => {
    const isVault = item._vault;
    const thumb = isVault
      ? (['.jpg','.jpeg','.png','.gif','.webp','.avif','.bmp'].includes((item.ext||'').toLowerCase()) ? '/api/vault/stream/'+item.id : '')
      : '/api/thumbs/'+item.id+'/0';
    const liked = likedIds.has(item.id);
    return `<div class="ig-profile-tile" onclick="openModal('${item.id}',${isVault})">
      ${thumb ? `<img src="${esc(thumb)}" loading="lazy" alt="" onerror="this.style.display='none'">` : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#333"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="5,3 19,12 5,21"/></svg></div>`}
      <div class="ig-profile-tile-overlay">
        <div class="ig-profile-tile-stat"><svg width="16" height="16" viewBox="0 0 24 24" fill="${liked?'#ed4956':'white'}" stroke="${liked?'#ed4956':'white'}" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></div>
      </div>
    </div>`;
  }).join('');
}

function closeProfile() {
  document.getElementById('ig-profile').classList.remove('show');
  document.getElementById('ig-feed').classList.remove('hidden');
  document.getElementById('ig-right').style.display = '';
}

function setProfileTab(tab) {
  document.querySelectorAll('.ig-profile-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('ig-ptab-' + tab).classList.add('active');
}

// ── Vault only ─────────────────────────────────────────────────────────────
async function toggleVaultOnly() {
  vaultOnly = !vaultOnly;
  document.getElementById('nav-vault').classList.toggle('vault-on', vaultOnly);
  if (vaultOnly && !vaultUnlocked) { showVaultUnlockPrompt(); return; }
  resetFeed();
}

function showVaultUnlockPrompt() {
  document.getElementById('ig-posts').innerHTML = `
    <div class="ig-vault-prompt">
      <h3>🔒 Vault Locked</h3>
      <p>Enter your vault password to view encrypted content.</p>
      <input class="ig-vault-input" type="password" id="vlt-pw" placeholder="Vault password" onkeydown="if(event.key==='Enter')doUnlock()">
      <button class="ig-unlock-btn" onclick="doUnlock()">Unlock</button>
      <div class="ig-vault-err" id="vlt-err"></div>
    </div>`;
  document.getElementById('ig-feed-status').innerHTML = '';
}

async function doUnlock() {
  const pw = document.getElementById('vlt-pw')?.value;
  const err = document.getElementById('vlt-err');
  if (!pw) return;
  const r = await fetch('/api/vault/unlock', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({password:pw}) });
  const d = await r.json();
  if (!r.ok) { if(err) err.textContent = d.error || 'Wrong password'; return; }
  vaultUnlocked = true;
  await loadVaultFiles();
  resetFeed();
}

function resetFeed() {
  // Stop all autoplaying videos before clearing DOM
  document.querySelectorAll('.ig-post-media video').forEach(v => { v.pause(); v.src = ''; });
  feedPage = 0; feedDone = false; feedLoading = false;
  document.getElementById('ig-posts').innerHTML = '';
  document.getElementById('ig-feed-status').innerHTML = '<div class="ig-spinner"></div>';
  loadFeedPage();
}

// ── Feed data ──────────────────────────────────────────────────────────────
function getRawItems() {
  if (vaultOnly) return vaultFiles.map(f => ({...f, _vault:true}));
  const vids = allVideos.map(v => ({...v, _vault:false}));
  const vlt  = vaultFiles.map(f => ({...f, _vault:true}));
  return [...vids, ...vlt];
}

function getFeedItems() {
  if (isShuffled) return shuffledOrder;
  const items = getRawItems();
  if (curSort === 'date')     return [...items].sort((a,b) => (b.mtime||0)-(a.mtime||0));
  if (curSort === 'duration') return [...items].sort((a,b) => (b.duration||0)-(a.duration||0));
  if (curSort === 'name')     return [...items].sort((a,b) => (a.name||a.originalName||'').localeCompare(b.name||b.originalName||''));
  if (curSort === 'size')     return [...items].sort((a,b) => (b.size||0)-(a.size||0));
  return items;
}

function loadFeedPage() {
  if (feedLoading || feedDone) return;
  feedLoading = true;
  const items = getFeedItems();
  const start = feedPage * PAGE_SIZE;
  const slice = items.slice(start, start + PAGE_SIZE);

  if (!slice.length) {
    feedDone = true; feedLoading = false;
    document.getElementById('ig-feed-status').innerHTML = start === 0
      ? '<p style="color:#555;padding:30px;text-align:center">No content found</p>'
      : '<div class="ig-end-msg">You\'re all caught up</div>';
    return;
  }

  const container = document.getElementById('ig-posts');
  slice.forEach(item => {
    const el = buildPost(item);
    container.appendChild(el);
    observePost(el);
  });

  feedPage++;
  feedLoading = false;
  if (feedPage * PAGE_SIZE >= items.length) {
    feedDone = true;
    document.getElementById('ig-feed-status').innerHTML = '<div class="ig-end-msg">You\'re all caught up</div>';
  } else {
    document.getElementById('ig-feed-status').innerHTML = '';
  }
}

function buildPost(item) {
  const isVault = item._vault;
  const name = item.name || item.originalName || 'Untitled';
  const category = isVault ? vaultUser(item) : (item.category || 'Uncategorized');
  const color = strColor(category);
  const mtime = item.mtime || 0;
  const isLiked = likedIds.has(item.id);
  const isSaved = savedIds.has(item.id);
  const ext = (item.ext || '').toLowerCase();
  const isImgFile = ['.jpg','.jpeg','.png','.gif','.webp','.avif','.bmp'].includes(ext);
  const isVideoFile = ['.mp4','.webm','.mkv','.mov','.avi','.m4v'].includes(ext) || (!isVault);

  let thumbSrc = '';
  let streamUrl = '';
  if (isVault && isImgFile) {
    thumbSrc = '/api/vault/stream/' + item.id;
  } else if (!isVault) {
    thumbSrc = '/api/thumbs/' + item.id + '/0';
    streamUrl = '/api/stream/' + item.id;
  } else if (isVault && isVideoFile) {
    streamUrl = '/api/vault/stream/' + item.id;
  }

  const div = document.createElement('div');
  div.className = 'ig-post';
  div.dataset.id = item.id;
  div.dataset.vault = isVault ? '1' : '0';
  if (streamUrl) div.dataset.stream = streamUrl;

  const profileKey = isVault ? ('vault:' + (item.folder || '__root__')) : ('cat:' + category);

  div.innerHTML = `
    <div class="ig-post-header">
      <div class="ig-post-avatar" style="background:${color};cursor:pointer" onclick="openProfile('${profileKey.replace(/'/g,"\\'")}')">${initial(category)}</div>
      <div class="ig-post-info">
        <div class="ig-post-username" style="cursor:pointer" onclick="openProfile('${profileKey.replace(/'/g,"\\'")}')">${esc(category)}</div>
        <div class="ig-post-meta">${timeAgo(mtime)}</div>
      </div>
      <button class="ig-post-menu" title="More">&#8943;</button>
    </div>
    <div class="ig-post-media" onclick="openModal('${item.id}',${isVault})">
      ${thumbSrc ? `<img src="${esc(thumbSrc)}" alt="" loading="lazy" onerror="this.style.display='none'">` : ''}
      ${!thumbSrc ? `<div class="ig-placeholder"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="1.5"><polygon points="5,3 19,12 5,21"/></svg><span style="font-size:12px;color:#444">${esc(name)}</span></div>` : ''}
      <div class="ig-play-overlay" style="z-index:2">
        <div class="ig-play-btn"><svg width="22" height="22" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg></div>
      </div>
      <div class="ig-muted-badge" onclick="unmutePost(event,this)">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="1" y1="1" x2="23" y2="23"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23M12 19v3M8 23h8"/></svg>
        Tap to unmute
      </div>
      ${isVault ? '<span class="ig-vault-tag">VAULT</span>' : ''}
      ${item.durationF ? `<span class="ig-duration-badge">${esc(item.durationF)}</span>` : ''}
    </div>
    <div class="ig-post-actions">
      <button class="ig-act-btn${isLiked?' liked':''}" title="Like" onclick="toggleLike(event,'${esc(item.id)}',${isVault})">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </button>
      <button class="ig-act-btn" title="Open" onclick="openModal('${item.id}',${isVault})">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </button>
      ${igAiCommentsEnabled ? `<button class="ig-act-btn" title="Comments" data-comments-btn="${esc(item.id)}" onclick="toggleIgComments(event,this,'${esc(item.id)}','${esc(name).replace(/'/g,"\\'")}')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><circle cx="9" cy="10" r="1" fill="currentColor"/><circle cx="12" cy="10" r="1" fill="currentColor"/><circle cx="15" cy="10" r="1" fill="currentColor"/></svg>
      </button>` : ''}
      <div class="ig-spacer"></div>
      <button class="ig-act-btn${isSaved?' saved':''}" title="Save" onclick="toggleSave(event,'${esc(item.id)}')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      </button>
    </div>
    <div class="ig-post-likes">${isLiked ? '&#10084; Liked' : ''}</div>
    <div class="ig-post-caption"><strong>${esc(category)}</strong>${esc(name)}</div>
    ${item.tags&&item.tags.length ? `<div class="ig-post-tags">${item.tags.map(t=>'#'+esc(t)).join(' ')}</div>` : ''}
    <div class="ig-post-time">${timeAgo(mtime)} ago</div>`;

  return div;
}

function unmutePost(e, badge) {
  e.stopPropagation();
  const mediaEl = badge.closest('.ig-post-media');
  const vid = mediaEl && mediaEl.querySelector('video');
  if (!vid) return;
  vid.muted = false;
  badge.style.display = 'none';
}

// ── Story viewer ───────────────────────────────────────────────────────────
let svItems = [];
let svIndex = 0;
let svTimer = null;

function openStoryViewer(cat) {
  svItems = allVideos.filter(v => (v.category || 'Uncategorized') === cat);
  if (!svItems.length) { openProfile('cat:' + cat); return; }
  svIndex = 0;
  const color = strColor(cat);
  document.getElementById('ig-sv-avatar').style.background = color;
  document.getElementById('ig-sv-avatar').textContent = initial(cat);
  document.getElementById('ig-sv-name').textContent = cat;
  document.getElementById('ig-story-viewer').classList.add('open');
  document.body.style.overflow = 'hidden';
  showStory(0);
}

function closeStoryViewer() {
  clearSvTimer();
  const media = document.getElementById('ig-sv-media');
  const vid = media.querySelector('video');
  if (vid) { vid.pause(); vid.src = ''; }
  document.getElementById('ig-story-viewer').classList.remove('open');
  document.body.style.overflow = '';
}

function clearSvTimer() {
  if (svTimer) { clearTimeout(svTimer); svTimer = null; }
}

function showStory(idx) {
  clearSvTimer();
  if (idx < 0 || idx >= svItems.length) { closeStoryViewer(); return; }
  svIndex = idx;

  const item = svItems[idx];
  const streamUrl = '/api/stream/' + item.id;
  const thumbSrc = '/api/thumbs/' + item.id + '/0';

  const media = document.getElementById('ig-sv-media');
  const prev = media.querySelector('video');
  if (prev) { prev.pause(); prev.src = ''; }

  const vid = document.createElement('video');
  vid.src = streamUrl;
  vid.autoplay = true;
  vid.playsInline = true;
  vid.controls = false;
  vid.poster = thumbSrc;
  vid.style.cssText = 'width:100%;height:100%;object-fit:contain;max-width:500px;display:block';

  const prevZone = document.getElementById('ig-sv-prev');
  const nextZone = document.getElementById('ig-sv-next');
  media.innerHTML = '';
  media.appendChild(vid);
  media.appendChild(prevZone);
  media.appendChild(nextZone);

  // progress bars
  const prog = document.getElementById('ig-sv-progress');
  prog.innerHTML = svItems.map((_, i) => `<div class="ig-sv-bar"><div class="ig-sv-bar-fill${i < idx ? ' done' : ''}"></div></div>`).join('');
  const fills = prog.querySelectorAll('.ig-sv-bar-fill');

  vid.addEventListener('loadedmetadata', () => {
    const dur = vid.duration || 8;
    fills[idx].style.setProperty('--sv-dur', dur + 's');
    fills[idx].classList.add('active');
    svTimer = setTimeout(() => nextStory(), dur * 1000);
  }, { once: true });

  vid.addEventListener('error', () => {
    fills[idx].style.setProperty('--sv-dur', '5s');
    fills[idx].classList.add('active');
    svTimer = setTimeout(() => nextStory(), 5000);
  }, { once: true });

  document.getElementById('ig-sv-counter').textContent = (idx + 1) + ' / ' + svItems.length;
}

function nextStory() { showStory(svIndex + 1); }
function prevStory() { showStory(svIndex - 1); }

// ── Stories ────────────────────────────────────────────────────────────────
function renderStories() {
  const el = document.getElementById('ig-stories');
  const cats = [...new Set(allVideos.map(v => v.category || 'Uncategorized'))].filter(Boolean).slice(0, 14);
  if (!cats.length) { el.innerHTML = ''; return; }
  el.innerHTML = cats.map(cat => {
    const color = strColor(cat);
    return `<div class="ig-story" onclick="openStoryViewer('${cat.replace(/'/g,"\\'")}')">
      <div class="ig-story-ring"><div class="ig-story-inner" style="background:${color}">${initial(cat)}</div></div>
      <span class="ig-story-name">${esc(cat)}</span>
    </div>`;
  }).join('');
}

// ── Suggestions ────────────────────────────────────────────────────────────
function renderSuggestions() {
  const el = document.getElementById('ig-suggestions');
  const cats = [...new Set(allVideos.map(v => v.category || 'Uncategorized'))].slice(0, 5);
  el.innerHTML = cats.map(cat => {
    const color = strColor(cat);
    const count = allVideos.filter(v => (v.category||'Uncategorized') === cat).length;
    return `<div class="ig-sug-item">
      <div class="ig-sug-avatar" style="background:${color};cursor:pointer" onclick="openProfile('cat:${cat.replace(/'/g,"\\'")}')"><span>${initial(cat)}</span></div>
      <div class="ig-sug-info">
        <div class="ig-sug-name" style="cursor:pointer" onclick="openProfile('cat:${cat.replace(/'/g,"\\'")}')"><span>${esc(cat)}</span></div>
        <div class="ig-sug-sub">${count} video${count!==1?'s':''}</div>
      </div>
      <button class="ig-sug-btn" onclick="openProfile('cat:${cat.replace(/'/g,"\\'")}')">View</button>
    </div>`;
  }).join('');
}

// ── Explore ────────────────────────────────────────────────────────────────
function renderExplore() {
  const grid = document.getElementById('ig-explore-grid');
  const status = document.getElementById('ig-explore-status');
  const items = getFeedItems();
  if (!items.length) { status.innerHTML = '<p style="color:#555;padding:30px;text-align:center">No content</p>'; return; }
  status.innerHTML = '';
  grid.innerHTML = items.map(item => {
    const isVault = item._vault;
    const name = item.name || item.originalName || 'Untitled';
    const ext = (item.ext||'').toLowerCase();
    const isImg = isVault && ['.jpg','.jpeg','.png','.gif','.webp','.avif','.bmp'].includes(ext);
    const thumbSrc = isVault && isImg ? '/api/vault/stream/'+item.id : (!isVault ? '/api/thumbs/'+item.id+'/0' : '');
    return `<div class="ig-explore-item" onclick="openModal('${item.id}',${isVault})">
      ${thumbSrc ? `<img src="${esc(thumbSrc)}" alt="${esc(name)}" loading="lazy">` : `<div class="ig-explore-placeholder"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#444" stroke-width="1.5"><polygon points="5,3 19,12 5,21"/></svg></div>`}
      <div class="ig-explore-overlay"><span><svg width="16" height="16" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg></span></div>
      ${isVault ? '<div class="ig-explore-vault"></div>' : ''}
    </div>`;
  }).join('');
}

// ── Modal ──────────────────────────────────────────────────────────────────
async function openModal(id, isVault) {
  curModal = {id, isVault};
  const modal = document.getElementById('ig-modal');
  const mediaEl = document.getElementById('ig-modal-media');
  const headerEl = document.getElementById('ig-modal-header');
  const bodyEl = document.getElementById('ig-modal-body');
  const actionsEl = document.getElementById('ig-modal-actions');
  mediaEl.innerHTML = '<div class="ig-spinner"></div>';
  headerEl.innerHTML = ''; bodyEl.innerHTML = ''; actionsEl.innerHTML = '';
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';

  const item = isVault ? vaultFiles.find(f => f.id===id) : allVideos.find(v => v.id===id);
  if (!item) { mediaEl.innerHTML = '<p style="color:#555;padding:30px">Not found</p>'; return; }

  const name = item.name || item.originalName || 'Untitled';
  const category = isVault ? vaultUser(item) : (item.category || 'Uncategorized');
  const color = strColor(category);
  const ext = (item.ext||'').toLowerCase();
  const isImgVault = isVault && ['.jpg','.jpeg','.png','.gif','.webp','.avif','.bmp'].includes(ext);
  const streamUrl = isVault ? '/api/vault/stream/'+id : '/api/stream/'+id;
  const profileKey = isVault ? ('vault:' + (item.folder || '__root__')) : ('cat:' + category);

  headerEl.innerHTML = `
    <div style="width:32px;height:32px;border-radius:50%;background:${color};display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0;cursor:pointer" onclick="openProfile('${profileKey.replace(/'/g,"\\'")}');closeModal()">${initial(category)}</div>
    <div class="ig-modal-info"><div class="ig-modal-username" style="cursor:pointer" onclick="openProfile('${profileKey.replace(/'/g,"\\'")}');closeModal()">${esc(category)}</div><div class="ig-modal-meta">${timeAgo(item.mtime||0)}</div></div>`;

  bodyEl.innerHTML = `
    <div class="ig-modal-title"><strong style="font-weight:600;margin-right:6px">${esc(category)}</strong>${esc(name)}</div>
    ${item.durationF ? `<div class="ig-modal-detail">Duration: ${esc(item.durationF)}</div>` : ''}
    ${item.size ? `<div class="ig-modal-detail">Size: ${formatBytes(item.size)}</div>` : ''}
    ${item.tags&&item.tags.length ? `<div class="ig-modal-detail" style="color:#a8a8a8;margin-top:8px">${item.tags.map(t=>'#'+esc(t)).join(' ')}</div>` : ''}
    <div id="modal-comments-section" style="display:none;margin-top:14px;border-top:1px solid #262626;padding-top:10px">
      <div id="modal-comments-list"></div>
    </div>`;

  const isLiked = likedIds.has(id), isSaved = savedIds.has(id);
  actionsEl.innerHTML = `
    <button class="ig-act-btn${isLiked?' liked':''}" id="modal-like-btn" onclick="toggleLike(event,'${esc(id)}',${isVault},true)">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
    </button>
    ${igAiCommentsEnabled ? `<button class="ig-act-btn" id="modal-comments-btn" title="Comments" onclick="toggleModalComments('${esc(id)}','${esc(name).replace(/'/g,"\\'")}')">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><circle cx="9" cy="10" r="1" fill="currentColor"/><circle cx="12" cy="10" r="1" fill="currentColor"/><circle cx="15" cy="10" r="1" fill="currentColor"/></svg>
    </button>` : ''}
    <div style="flex:1"></div>
    <button class="ig-act-btn${isSaved?' saved':''}" id="modal-save-btn" onclick="toggleSave(event,'${esc(id)}',true)">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
    </button>`;

  mediaEl.innerHTML = isImgVault
    ? `<img src="${esc(streamUrl)}" alt="${esc(name)}">`
    : `<video src="${esc(streamUrl)}" controls autoplay style="max-width:min(860px,65vw);max-height:90vh" preload="metadata"></video>`;
}

function closeModal() {
  document.getElementById('ig-modal').classList.remove('open');
  document.body.style.overflow = '';
  const vid = document.getElementById('ig-modal-media').querySelector('video');
  if (vid) { vid.pause(); vid.src = ''; }
  curModal = null;
}

// ── AI Comments ────────────────────────────────────────────────────────────
const _igCommentCache = {};

function _igAvatarColor(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) & 0xffffffff;
  return 'hsl(' + (Math.abs(h) % 360) + ',55%,45%)';
}

function _igUsername() {
  const adj  = ['Curious','Sneaky','Bold','Gentle','Witty','Calm','Fuzzy','Quick','Silent','Clever'];
  const noun = ['Otter','Falcon','Panda','Wolf','Raven','Tiger','Fox','Lynx','Elk','Bear'];
  const num  = Math.floor(Math.random() * 90 + 10);
  return adj[Math.floor(Math.random() * adj.length)] + noun[Math.floor(Math.random() * noun.length)] + num;
}

function _renderIgComments(comments) {
  return comments.map(text => {
    const user  = _igUsername();
    const color = _igAvatarColor(user);
    return '<div class="ig-comment-row">' +
      '<div class="ig-comment-avatar" style="background:' + color + '">' + esc(user[0]) + '</div>' +
      '<div><div class="ig-comment-username">' + esc(user) + '</div>' +
      '<div class="ig-comment-text">' + esc(text) + '</div></div></div>';
  }).join('');
}

async function _fetchIgComments(id, name, listEl) {
  if (_igCommentCache[id]) { listEl.innerHTML = _renderIgComments(_igCommentCache[id]); return; }
  listEl.innerHTML = '<div class="ig-comments-loading"><div class="ig-comments-spinner"></div>Generating comments…</div>';
  try {
    const r = await fetch('/api/comments/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ videoId: id, videoName: name })
    });
    if (!r.ok) { listEl.innerHTML = '<div style="font-size:13px;color:#a8a8a8;padding:4px 0">Comments unavailable</div>'; return; }
    const { comments } = await r.json();
    _igCommentCache[id] = comments;
    listEl.innerHTML = _renderIgComments(comments);
  } catch {
    listEl.innerHTML = '<div style="font-size:13px;color:#a8a8a8;padding:4px 0">Comments unavailable</div>';
  }
}

function toggleIgComments(e, btn, id, name) {
  e.stopPropagation();
  openCommentsModal(id, name);
}

function toggleModalComments(id, name) {
  openCommentsModal(id, name);
}

function openCommentsModal(id, name) {
  const modal = document.getElementById('ig-comments-modal');
  const body  = document.getElementById('ig-comments-sheet-body');
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';
  if (_igCommentCache[id]) {
    body.innerHTML = _renderIgComments(_igCommentCache[id]);
    return;
  }
  body.innerHTML = '<div class="ig-comments-loading"><div class="ig-comments-spinner"></div>Generating comments…</div>';
  _fetchIgComments(id, name, body);
}

function closeCommentsModal() {
  document.getElementById('ig-comments-modal').classList.remove('open');
  document.body.style.overflow = '';
}

// ── Like / Save ────────────────────────────────────────────────────────────
async function toggleLike(e, id, isVault, fromModal) {
  e.stopPropagation();
  if (likedIds.has(id)) likedIds.delete(id); else likedIds.add(id);
  const liked = likedIds.has(id);
  document.querySelectorAll(`[data-id="${id}"] .ig-act-btn[title="Like"]`).forEach(b => b.classList.toggle('liked', liked));
  const likesEl = document.querySelector(`[data-id="${id}"] .ig-post-likes`);
  if (likesEl) likesEl.innerHTML = liked ? '&#10084; Liked' : '';
  if (fromModal) document.getElementById('modal-like-btn')?.classList.toggle('liked', liked);
  if (isVault) fetch('/api/vault/favs/' + id, {method:'POST'}).catch(()=>{});
  else fetch('/api/favourites/' + id, {method:'POST'}).catch(()=>{});
}

function toggleSave(e, id, fromModal) {
  e.stopPropagation();
  if (savedIds.has(id)) savedIds.delete(id); else savedIds.add(id);
  const saved = savedIds.has(id);
  document.querySelectorAll(`[data-id="${id}"] .ig-act-btn[title="Save"]`).forEach(b => b.classList.toggle('saved', saved));
  if (fromModal) document.getElementById('modal-save-btn')?.classList.toggle('saved', saved);
}

// ── Infinite scroll ────────────────────────────────────────────────────────
window.addEventListener('scroll', () => {
  if (curView !== 'feed' || feedDone || feedLoading) return;
  if (document.documentElement.scrollHeight - window.innerHeight - window.scrollY < 600) loadFeedPage();
});

// ── Keyboard ───────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModal(); closeCommentsModal(); closeStoryViewer(); }
  if (document.getElementById('ig-story-viewer').classList.contains('open')) {
    if (e.key === 'ArrowRight') nextStory();
    if (e.key === 'ArrowLeft') prevStory();
  }
});
document.getElementById('ig-modal').addEventListener('click', e => { if (e.target === document.getElementById('ig-modal')) closeModal(); });

init();
</script>
